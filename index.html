              ${got ? '<div style="font-size:0.7em;color:var(--neon-yellow);margin-top:4px;font-weight:900">✓ הושג</div>' : '<div style="font-size:0.7em;color:#666;margin-top:4px">🔒 נעול</div>'}
            </div>
          `;
        }).join('')}
      </div>
    `;
  }
}

function renderStudentShopItem(s, item, slot, previewOw, previewEq, previewPts) {
  const owned = previewOw.includes(item.id);
  const equipped = previewEq[slot] === item.id;
  const canAfford = previewPts >= item.price;
  const pendingThis = pendingForStudent(s.id).some(p => p.itemId === item.id);
  const rarity = getItemRarity(item);
  let cls = '';
  if (equipped) cls = 'equipped';
  else if (owned) cls = 'owned';
  else if (!canAfford) cls = 'locked';
  if (rarity !== RARITY.common) cls += ' rarity-' + (rarity === RARITY.rare ? 'rare' : rarity === RARITY.epic ? 'epic' : 'mythic');
  const action = equipped ? ''
    : owned ? `onclick="studentEquip('${slot}','${item.id}')"`
    : (canAfford ? `onclick="studentBuy('${slot}','${item.id}', ${item.price})"` : '');
  const isNone = item.id.endsWith('-none');
  return `
    <div class="shop-item ${cls}" ${action} style="position:relative">
      ${rarity !== RARITY.common ? `<div class="rarity-badge" style="background:${rarity.color};color:#000">${rarity.name}</div>` : ''}
      ${pendingThis ? '<div style="position:absolute;top:4px;left:4px;font-size:0.7em;background:#ff8c00;color:#000;padding:2px 6px;border-radius:6px;font-weight:900">⏳</div>' : ''}
      ${isNone
        ? '<div class="shop-preview" style="display:flex;align-items:center;justify-content:center;font-size:32px;color:#666">🚫</div>'
        : `<canvas class="shop-preview" data-stshop="1" data-slot="${slot}" data-item="${item.id}" width="160" height="160"></canvas>`}
      <div class="shop-name">${escapeHtml(item.name)}</div>
      ${equipped ? '<div class="shop-status">✓ לבוש</div>'
        : owned ? '<div class="shop-status">קליק להלביש</div>'
        : `<div class="shop-price">⭐ ${item.price}</div>`}
    </div>
  `;
}

function addPending(pending) {
  pending.id = 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2,5);
  pending.ts = Date.now();
  state.pending = state.pending || [];
  state.pending.push(pending);
  save();
  renderStudentProfile();
  burstConfetti(window.innerWidth/2, window.innerHeight/2, 20);
  playSound('buy');
}
function studentBuy(slot, itemId, price) {
  const found = findStudent(studentSelectedId);
  if (!found) return;
  if (previewPoints(found.student) < price) return;
  addPending({ type: 'buy', studentId: found.student.id, classId: found.cls.id, slot, itemId, price });
}
function studentEquip(slot, itemId) {
  const found = findStudent(studentSelectedId);
  if (!found) return;
  addPending({ type: 'equip', studentId: found.student.id, classId: found.cls.id, slot, itemId, price: 0 });
}
function studentOpenBox() {
  const found = findStudent(studentSelectedId);
  if (!found) return;
  if (previewPoints(found.student) < MYSTERY_BOX_PRICE) return;
  const allItems = [...SHOP.hats.slice(1), ...SHOP.glasses.slice(1), ...SHOP.pets.slice(1), ...SHOP.bodies.slice(1), ...SHOP.auras.slice(1)]; // characters not in mystery box
  const item = allItems[Math.floor(Math.random() * allItems.length)];
  let slot = 'hat';
  if (SHOP.bodies.find(i => i.id === item.id)) slot = 'body';
  else if (SHOP.glasses.find(i => i.id === item.id)) slot = 'glasses';
  else if (SHOP.pets.find(i => i.id === item.id)) slot = 'pet';
  else if (SHOP.auras.find(i => i.id === item.id)) slot = 'aura';
  addPending({ type: 'buy', studentId: found.student.id, classId: found.cls.id, slot, itemId: item.id, price: MYSTERY_BOX_PRICE });
  alert(`🎉 קיבלת: ${item.name}! ממתין לאישור המורה.`);
}

window.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

// ==================== PARTICLE LAYER ====================
function spawnParticles() {
  const layer = document.getElementById('particleLayer');
  if (!layer) return;
  // Reduced from 25 → 12 active, slower spawn
  for (let i = 0; i < 12; i++) {
    setTimeout(() => createParticle(layer), i * 1200);
  }
  setInterval(() => {
    // pause particle spawn while user is inactive (saves CPU)
    if (document.hidden) return;
    createParticle(layer);
  }, 2400);
}
function createParticle(layer) {
  const p = document.createElement('div');
  const variant = 1 + Math.floor(Math.random() * 5);
  p.className = 'particle bubble' + variant;
  p.style.left = (Math.random() * 100) + '%';
  const dur = 14 + Math.random() * 14;
  p.style.animation = `floatUp ${dur}s linear`;
  p.style.animationDelay = (-Math.random() * dur) + 's';
  layer.appendChild(p);
  setTimeout(() => p.remove(), dur * 1000);
}

// ==================== AMBIENT MUSIC v2 (full band) ====================
let musicCtx = null, musicMaster = null, musicDryGain = null, musicWetGain = null, musicPlaying = false, musicTimeout = null;
const MUSIC_KEY = 'cps_music_on_v1';

function startMusic() {
  if (musicPlaying) return;
  musicPlaying = true;
  if (!musicCtx) musicCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (musicCtx.state === 'suspended') musicCtx.resume();

  musicMaster = musicCtx.createGain();
  musicMaster.gain.value = 0;
  musicMaster.gain.linearRampToValueAtTime(0.7, musicCtx.currentTime + 1.5);
  musicMaster.connect(musicCtx.destination);

  // light reverb via feedback delay
  const delay = musicCtx.createDelay(0.6);
  delay.delayTime.value = 0.22;
  const feedback = musicCtx.createGain();
  feedback.gain.value = 0.35;
  const wet = musicCtx.createGain();
  wet.gain.value = 0.25;
  delay.connect(feedback); feedback.connect(delay);
  delay.connect(wet); wet.connect(musicMaster);
  musicWetGain = wet;
  musicDryGain = musicMaster;

  // chord progression: C - G - Am - F (pop classic)
  const N = {
    C3:130.81, D3:146.83, E3:164.81, F3:174.61, G3:196.00, A3:220.00, B3:246.94,
    C4:261.63, D4:293.66, E4:329.63, F4:349.23, G4:392.00, A4:440.00, B4:493.88,
    C5:523.25, D5:587.33, E5:659.25, F5:698.46, G5:783.99, A5:880.00, B5:987.77,
    C6:1046.50, D6:1174.66, E6:1318.51,
  };
  const chords = [
    { bass: N.C3, notes: [N.C4, N.E4, N.G4] },
    { bass: N.G3, notes: [N.G3, N.B3, N.D4] },
    { bass: N.A3, notes: [N.A3, N.C4, N.E4] },
    { bass: N.F3, notes: [N.F3, N.A3, N.C4] },
  ];
  // melody phrase per bar — kid-friendly hook
  const melodies = [
    [[N.E5,1],[N.G5,0.5],[N.E5,0.5],[N.C5,1],[N.D5,1]],            // over C
    [[N.D5,0.5],[N.G5,0.5],[N.B5,0.5],[N.D6,0.5],[N.B5,1],[N.G5,1]],// over G
    [[N.A4,1],[N.C5,0.5],[N.E5,0.5],[N.A5,1],[N.E5,1]],             // over Am
    [[N.F5,0.5],[N.A5,0.5],[N.C6,1],[N.A5,1],[N.F5,1]],             // over F
  ];

  const tempo = 108;
  const beat = 60 / tempo;
  const bar = beat * 4;
  let measure = 0;

  function playMeasure() {
    if (!musicPlaying) return;
    const t0 = musicCtx.currentTime + 0.05;
    const idx = measure % chords.length;
    const chord = chords[idx];
    const mel = melodies[idx];

    // ===== drums =====
    for (let b = 0; b < 4; b++) {
      const tb = t0 + b * beat;
      // kick on 1 and 3
      if (b === 0 || b === 2) playKick(tb);
      // snare on 2 and 4
      if (b === 1 || b === 3) playSnare(tb);
      // hi-hat 8th notes
      playHat(tb, b === 0);
      playHat(tb + beat / 2, false);
    }
    // tiny hihat fills on bar 4
    if (idx === 3) {
      playHat(t0 + bar - beat * 0.25, false);
      playHat(t0 + bar - beat * 0.125, false);
    }

    // ===== bass groove =====
    playBass(t0, chord.bass, beat * 1.5);
    playBass(t0 + beat * 1.75, chord.bass, beat * 0.25);
    playBass(t0 + beat * 2, chord.bass, beat * 0.75);
    playBass(t0 + beat * 3, chord.bass * 1.498, beat * 0.5); // 5th up
    playBass(t0 + beat * 3.5, chord.bass, beat * 0.5);

    // ===== pad: sustained chord =====
    chord.notes.forEach(freq => playPad(t0, freq, bar * 0.95));

    // ===== melody (lead) =====
    let mt = t0;
    mel.forEach(([f, d]) => {
      playLead(mt, f, beat * d);
      mt += beat * d;
    });

    // ===== sparkle accents on bars 2 and 4 =====
    if (idx === 1 || idx === 3) {
      playSparkle(t0 + bar - beat * 0.5, [N.E6, N.G5, N.C6][idx % 3] || N.E6);
    }

    measure++;
    musicTimeout = setTimeout(playMeasure, bar * 1000);
  }
  playMeasure();
}

function playKick(t) {
  const osc = musicCtx.createOscillator();
  const g = musicCtx.createGain();
  osc.frequency.setValueAtTime(160, t);
  osc.frequency.exponentialRampToValueAtTime(40, t + 0.12);
  osc.type = 'sine';
  g.gain.setValueAtTime(0.55, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
  osc.connect(g); g.connect(musicDryGain);
  osc.start(t); osc.stop(t + 0.22);
}
function playSnare(t) {
  // body
  const osc = musicCtx.createOscillator();
  const og = musicCtx.createGain();
  osc.frequency.value = 200;
  osc.type = 'triangle';
  og.gain.setValueAtTime(0.16, t);
  og.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
  osc.connect(og); og.connect(musicDryGain);
  osc.start(t); osc.stop(t + 0.1);
  // noise
  const noise = createNoise(0.13);
  const filter = musicCtx.createBiquadFilter();
  filter.type = 'bandpass'; filter.frequency.value = 2200; filter.Q.value = 1.0;
  const ng = musicCtx.createGain();
  ng.gain.setValueAtTime(0.15, t);
  ng.gain.exponentialRampToValueAtTime(0.001, t + 0.13);
  noise.connect(filter); filter.connect(ng); ng.connect(musicDryGain);
  noise.start(t); noise.stop(t + 0.15);
}
function playHat(t, accent) {
  const noise = createNoise(0.06);
  const filter = musicCtx.createBiquadFilter();
  filter.type = 'highpass'; filter.frequency.value = 7500;
  const g = musicCtx.createGain();
  const vol = accent ? 0.07 : 0.04;
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
  noise.connect(filter); filter.connect(g); g.connect(musicDryGain);
  noise.start(t); noise.stop(t + 0.07);
}
function createNoise(dur) {
  const buf = musicCtx.createBuffer(1, Math.max(1, Math.floor(musicCtx.sampleRate * dur)), musicCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
  const src = musicCtx.createBufferSource();
  src.buffer = buf;
  return src;
}
function playBass(t, freq, dur) {
  const osc = musicCtx.createOscillator();
  osc.frequency.value = freq;
  osc.type = 'triangle';
  const sub = musicCtx.createOscillator();
  sub.frequency.value = freq;
  sub.type = 'sine';
  const filter = musicCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(800, t);
  filter.frequency.exponentialRampToValueAtTime(300, t + dur);
  const g = musicCtx.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.18, t + 0.01);
  g.gain.linearRampToValueAtTime(0.14, t + dur * 0.6);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.connect(filter); sub.connect(filter); filter.connect(g); g.connect(musicDryGain);
  osc.start(t); osc.stop(t + dur + 0.05);
  sub.start(t); sub.stop(t + dur + 0.05);
}
function playPad(t, freq, dur) {
  // layered: sine + slightly detuned sine (for chorus) + triangle harmonic
  for (const conf of [
    {type:'sine', detune: 0,    vol: 0.04},
    {type:'sine', detune: 7,    vol: 0.025},
    {type:'sine', detune: -7,   vol: 0.025},
    {type:'triangle', detune: 0, mul: 2, vol: 0.018},
  ]) {
    const osc = musicCtx.createOscillator();
    osc.frequency.value = freq * (conf.mul || 1);
    osc.detune.value = conf.detune;
    osc.type = conf.type;
    const filter = musicCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 2200;
    const g = musicCtx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(conf.vol, t + 0.5);
    g.gain.linearRampToValueAtTime(conf.vol * 0.7, t + dur * 0.7);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    osc.connect(filter); filter.connect(g); g.connect(musicDryGain);
    g.connect(musicWetGain); // also send to reverb
    osc.start(t); osc.stop(t + dur + 0.1);
  }
}
function playLead(t, freq, dur) {
  const osc = musicCtx.createOscillator();
  osc.frequency.value = freq;
  osc.type = 'sawtooth';
  // detuned 2nd osc for thickness
  const osc2 = musicCtx.createOscillator();
  osc2.frequency.value = freq;
  osc2.detune.value = 8;
  osc2.type = 'sawtooth';
  const filter = musicCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.Q.value = 3;
  filter.frequency.setValueAtTime(freq * 2, t);
  filter.frequency.exponentialRampToValueAtTime(freq * 5, t + 0.1);
  filter.frequency.exponentialRampToValueAtTime(freq * 3, t + dur);
  const g = musicCtx.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.06, t + 0.02);
  g.gain.linearRampToValueAtTime(0.04, t + dur * 0.7);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.connect(filter); osc2.connect(filter); filter.connect(g);
  g.connect(musicDryGain);
  g.connect(musicWetGain);
  osc.start(t); osc.stop(t + dur + 0.05);
  osc2.start(t); osc2.stop(t + dur + 0.05);
}
function playSparkle(t, freq) {
  // bell tone: fundamental + 3rd + 5th harmonic
  for (const [mul, vol] of [[1, 0.05], [3, 0.025], [5, 0.015]]) {
    const osc = musicCtx.createOscillator();
    osc.frequency.value = freq * mul;
    osc.type = 'sine';
    const g = musicCtx.createGain();
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 1.0);
    osc.connect(g); g.connect(musicDryGain);
    g.connect(musicWetGain);
    osc.start(t); osc.stop(t + 1.1);
  }
}

function stopMusic() {
  if (!musicPlaying) return;
  musicPlaying = false;
  if (musicTimeout) { clearTimeout(musicTimeout); musicTimeout = null; }
  if (musicMaster) {
    musicMaster.gain.linearRampToValueAtTime(0, musicCtx.currentTime + 0.5);
  }
}

function toggleMusic() {
  const btn = document.getElementById('musicBtn');
  if (musicPlaying) {
    stopMusic();
    btn.textContent = '🎵';
    btn.classList.remove('playing');
    localStorage.setItem(MUSIC_KEY, 'off');
  } else {
    startMusic();
    btn.textContent = '🔊';
    btn.classList.add('playing');
    localStorage.setItem(MUSIC_KEY, 'on');
  }
}

// auto-resume music if was on
function maybeAutoMusic() {
  if (localStorage.getItem(MUSIC_KEY) === 'on') {
    // need user gesture — wait for first click
    const onFirst = () => {
      startMusic();
      document.getElementById('musicBtn').textContent = '🔊';
      document.getElementById('musicBtn').classList.add('playing');
      document.removeEventListener('click', onFirst);
    };
    document.addEventListener('click', onFirst, { once: true });
  }
}

spawnParticles();
maybeAutoMusic();

// ==================== INIT ====================
async function init() {
  const text = document.getElementById('loadingText');
  const bar = document.getElementById('loadingBar');
  const detail = document.getElementById('loadingDetail');
  const labels = {
    'Flamingo': '🦩 פלמינגו',
    'Parrot':   '🦜 תוכי',
    'Stork':    '🐦 חסידה',
    'Fox':      '🦊 שועל',
    'Horse':    '🐴 סוס',
    'Duck':     '🦆 ברווז',
  };
  // load pet GLBs in background — never block startup
  preloadAllModels((done, total, url) => {
    const pct = Math.round((done / total) * 100);
    bar.style.width = pct + '%';
    const key = Object.keys(labels).find(k => url.includes(k));
    detail.textContent = `${labels[key] || url} · ${done}/${total}`;
    // re-render any visible avatars when a model finishes loading
    if (typeof renderAll === 'function' && document.getElementById('loadingScreen').style.display === 'none') {
      renderAll();
    }
  });

  // try cloud (with timeout) — don't block on it
  text.textContent = '☁️ מסנכרן...';
  try {
    const cloudPromise = cloudLoad();
    const timeout = new Promise(r => setTimeout(() => r(null), 4000));
    const cloud = await Promise.race([cloudPromise, timeout]);
    if (cloud && cloud.classes) {
      state = cloud;
      if (!state.pending) state.pending = [];
      state.classes.forEach(c => c.students.forEach(s => {
        if (!s.equipped.aura) s.equipped.aura = 'aura-none';
        if (!s.owned.includes('aura-none')) s.owned.push('aura-none');
      }));
      lastCloudHash = JSON.stringify(state);
      localStorage.setItem('cps_state_v2', lastCloudHash);
    } else if (cloud && cloud.error) {
      console.warn('Firebase access denied — running offline');
    } else {
      cloudSave(state);
    }
  } catch (e) { console.warn('cloud err', e); }

  text.textContent = '✓ מוכן!';
  detail.textContent = APP_MODE === 'student' ? '🏠 מצב בית' : '🧑‍🏫 מצב כיתה';
  document.getElementById('loadingScreen').style.display = 'none';
  renderAll();
  startCloudPoll();
}

init();
